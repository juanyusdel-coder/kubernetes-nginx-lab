apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-deployment
  namespace: nginx-lab

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nginx

  template:

    metadata:
      labels:
        app: nginx

    spec:

      containers:
      - name: nginx

        image: nginx:latest

        ports:
        - containerPort: 80

        env:

        - name: ENVIRONMENT

          valueFrom:
            configMapKeyRef:
              name: nginx-config
              key: environment